[package]
name = "code_parser"
version = "0.1.0"
edition = "2021"

description = "A parser and formatter library in Rust"

[lib]
name = "code_parser"

[[bin]]
name = "parser_cli"
path = "src/bin/main.rs"

[[bin]]
name = "editor"
path = "src/bin/gui_main.rs"

[dependencies]
anyhow = "1.0"
thiserror = "2.0"
slint = { version = "1.8", default-features = false, features = ["backend-winit", "renderer-winit-femtovg", "compat-1-2"] }
rfd = "0.15"

[build-dependencies]
slint-build = "1.8"
