[package]
name = "code_parser"
version = "0.1.0"
edition = "2021"

description = "A parser and formatter library in Rust"

[lib]
name = "code_parser"

[[bin]]
name = "editor"
path = "src/bin/gui_main.rs"

[[bin]]
name = "debug-tokens"
path = "src/bin/cli_debug.rs"

[dependencies]
thiserror = "2.0"
rfd = "0.15"

# GUI — wgpu вместо glow (исправляет баг glutin/wgl на Windows)
eframe = { version = "0.31", default-features = false, features = ["wgpu"] }
egui = "0.31"

# Сериализация настроек
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"

[build-dependencies]

[dev-dependencies]
tempfile = "3.0"
egui_kittest = { version = "0.31", features = ["eframe"] }
