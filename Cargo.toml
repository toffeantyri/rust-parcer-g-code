[package]
name = "code_parser"
version = "0.1.0"
edition = "2021"

description = "A parser and formatter library in Rust"

[lib]
name = "code_parser"

[[bin]]
name = "parser_cli"
path = "src/bin/main.rs"

[[bin]]
name = "gcode_editor"
path = "src/bin/gui_main.rs"

[dependencies]
slint = { version = "1.8", default-features = false, features = ["backend-winit", "renderer-software", "compat-1-2"] }
rfd = "0.15"

[build-dependencies]
slint-build = "1.8"
